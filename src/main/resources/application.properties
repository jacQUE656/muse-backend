spring.application.name=muse-backend

spring.config.import=optional:file:.env[.properties]
server.port=2011
#DATASOURCE
spring.datasource.url=jdbc:postgresql://dpg-d6pr53hj16oc73bku920-a.oregon-postgres.render.com/${DB_NAME}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

#JPA
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=update



spring.mail.verify.host.frontend=https://muse-ic.netlify.app


#MAIL

app.mail.from=${EMAIL_UNAME}
spring.sendgrid.api-key=${SENDGRID_API_KEY}


#24 Hours recommended 15minutes
jwt-access-token-expiration=86400000

#7days
jwt-refresh-token-expiration=604800000

disposable-email: 10minutemail, 20minutemail, 33mail, 5ymail, anonbox, mailinator, mailnesia, throwawaymail, yopmail,trashmail,temp-mail,tempmail,moakt, querillamail

# CLOUDINARY CONFIG
cloudinary.cloud-name=${CLOUDINARY_NAMEE}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

#File upload config
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

#OAUTH2 CONFIG
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=profile,email

logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG