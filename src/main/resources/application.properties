spring.application.name=muse-backend

spring.config.import=optional:file:.env[.properties]
server.port=2011
#DATASOURCE
spring.datasource.url=jdbc:mysql://${DB_URL}:${DB_PORT}/musify
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.transaction.jta.platform=org.hibernate.engine.transaction.jta.platform.internal.NoJtaPlatform

#JPA
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=update

#MAIL
spring.mail.host=smtp.gmail.com
spring.mail.verify.host=http://localhost/2011
spring.mail.verify.host.frontend=http://localhost:5173
spring.mail.port=587
spring.mail.username=${EMAIL_UNAME}
spring.mail.password=${EMAIL_PASS}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=60000
spring.mail.properties.mail.smtp.timeout=60000
spring.mail.properties.mail.smtp.writetimeout=60000
#api-prefix=/api/v2
#24 Hours recommended 15minutes
jwt-access-token-expiration=86400000

#7days
jwt-refresh-token-expiration=604800000

disposable-email: 10minutemail, 20minutemail, 33mail, 5ymail, anonbox, mailinator, mailnesia, throwawaymail, yopmail,trashmail,temp-mail,tempmail,moakt, querillamail

# CLOUDINARY CONFIG
cloudinary.cloud-name=${CLOUDINARY_NAMEE}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

#File upload config
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

jwt.keys.path=jwt_locals/

