services:
  mysql:
    image: mysql:8.0
    container_name: mysql-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: musify
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    expose:
      - "3306"

  muse-app:
    build: .
    container_name: muse-app
    restart: unless-stopped
    depends_on:
      - mysql
    volumes:
      # Mount the secure Linux directory containing your PEM files
      - /jwt_locals:/app/jwt_locals
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/musify
      - SPRING_DATASOURCE_USERNAME=${DB_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - CLOUDINARY_SECRETE=${CLOUDINARY_API_SECRET}
      - CLOUDINARY_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_NAME=${CLOUDINARY_NAMEE}
      - EMAIL_USERNAME=${EMAIL_UNAME}
      - EMAIL_PASSWORD=${EMAIL_PASS}
      - JWT_KEYS_PATH=/jwt_locals/
    ports:
      - "80:2011"

volumes:
  mysql_data: